<!doctype html><html lang="fr"><head><meta charset="utf-8">
<title>Enveloppe DL — Impression Android</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css?v={APP_VERSION}">
<link rel="stylesheet" href="print-env-dl.css?v={APP_VERSION}">
</head><body class="{SEGMENT_CLASS}">
<main class="envelope-dl"><section class="recipient-block">
<p class="recipient-name">{CIVILITE} {NOM} {PRENOM}</p>
<p class="recipient-address">{ADRESSE}</p>
<p class="recipient-city">{CP} {VILLE}</p>
</section></main>
<script>window.addEventListener('load',()=>{try{window.focus();setTimeout(()=>{window.print();},120);}catch(e){}});</script>
</body></html>
